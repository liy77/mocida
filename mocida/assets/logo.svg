<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="420" height="420" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Mocida">
  <title>Mocida</title>
  <defs>
    <!-- Soft outward glow used on both squares. Kept compact so the
         visible content fills the canvas tightly for icon use. -->
    <filter id="m-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Tight 50% overlap (Mocida mark). 240px squares sit with ~30px of
       glow margin to every canvas edge, so the icon doesn't waste
       space when shrunk to 16/32/48px favicons or window icons. -->
  <rect x="30"  y="30"  width="240" height="240" rx="32" fill="#5271ff" filter="url(#m-glow)" opacity="0.95"/>
  <rect x="150" y="150" width="240" height="240" rx="32" fill="#ff3131" filter="url(#m-glow)" opacity="0.95"/>
</svg>
