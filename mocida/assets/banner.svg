<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Mocida — Modular UI toolkit in C on top of SDL3">
  <title>Mocida</title>

  <defs>
    <!-- Gradient surface that subtly drifts. Auto-adapts roughly between
         dark/light backgrounds by being mostly transparent slate. -->
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0"   stop-color="#0b1220" stop-opacity="0.95"/>
      <stop offset="0.6" stop-color="#111827" stop-opacity="0.92"/>
      <stop offset="1"   stop-color="#0b1220" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Reusable rounded card shape. -->
    <symbol id="dot" viewBox="-1 -1 2 2"><circle r="1"/></symbol>
  </defs>

  <!-- Stage -->
  <rect width="1200" height="260" rx="18" fill="url(#bg)"/>

  <!-- Subtle grid backdrop -->
  <g stroke="#1f2937" stroke-width="1" opacity="0.4">
    <line x1="0" y1="65"  x2="1200" y2="65" />
    <line x1="0" y1="130" x2="1200" y2="130"/>
    <line x1="0" y1="195" x2="1200" y2="195"/>
  </g>

  <!-- Floating accent particles -->
  <g fill="#38bdf8" opacity="0.18">
    <circle cx="180" cy="40"  r="2"><animate attributeName="cy" values="40;30;40"  dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="220" r="3"><animate attributeName="cy" values="220;210;220" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="30"  r="2"><animate attributeName="cy" values="30;40;30"   dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="180" r="3"><animate attributeName="cy" values="180;170;180" dur="6.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- LOGO group: two breathing blocks -->
  <g transform="translate(90, 70)">
    <!-- blue block -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-2 50 50; 2 50 50; -2 50 50" dur="7s" repeatCount="indefinite"/>
      <rect x="0" y="0" width="100" height="100" rx="14" fill="#5271ff" filter="url(#glow)" opacity="0.95"/>
    </g>
    <!-- red block, offset -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="3 100 100; -3 100 100; 3 100 100" dur="8s" repeatCount="indefinite"/>
      <rect x="50" y="50" width="100" height="100" rx="14" fill="#ff3131" filter="url(#glow)" opacity="0.95"/>
    </g>
  </g>

  <!-- Title -->
  <text x="280" y="120" fill="#e2e8f0"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="64" font-weight="800" letter-spacing="-1.5">Mocida</text>
  <!-- Tagline -->
  <text x="282" y="158" fill="#94a3b8"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="18" font-weight="500" letter-spacing="0.2">Modular UI toolkit · C · SDL3 · D3D / OpenGL / Vulkan / Metal</text>
  <!-- Accent underline -->
  <rect x="282" y="172" height="2" rx="1" fill="url(#accent)">
    <animate attributeName="width" values="0;180;180;0" keyTimes="0;0.4;0.85;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Right side: animated widget mini-gallery -->
  <g transform="translate(820, 56)">
    <!-- "card" backdrop -->
    <rect x="-12" y="-10" width="324" height="160" rx="14" fill="#161f33" opacity="0.6" stroke="#1f2937"/>

    <!-- Pill button -->
    <g>
      <rect x="0" y="0" width="160" height="40" rx="20" fill="#0ea5e9">
        <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="0" y="0" width="160" height="40" rx="20" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0">
        <animate attributeName="opacity" values="0;0.5;0" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="x" values="0;-4" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="0;-4" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="width" values="160;168" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="height" values="40;48" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <text x="80" y="25" text-anchor="middle" fill="white"
            font-family="Inter, sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">CLICK ME</text>
    </g>

    <!-- Switch -->
    <g transform="translate(180, 4)">
      <rect width="60" height="32" rx="16" fill="#0ea5e9" opacity="0.35"/>
      <circle cy="16" r="12" fill="#fff">
        <animate attributeName="cx" values="16;44;44;16;16" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Slider -->
    <g transform="translate(0, 70)">
      <rect width="240" height="6" rx="3" fill="#1f2937"/>
      <rect width="0" height="6" rx="3" fill="url(#accent)">
        <animate attributeName="width" values="0;180;180;0" keyTimes="0;0.45;0.55;1" dur="5s" repeatCount="indefinite"/>
      </rect>
      <circle cy="3" r="9" fill="#fff" stroke="#0ea5e9" stroke-width="2">
        <animate attributeName="cx" values="0;180;180;0" keyTimes="0;0.45;0.55;1" dur="5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Progress bar -->
    <g transform="translate(0, 110)">
      <rect width="300" height="4" rx="2" fill="#1f2937"/>
      <rect height="4" rx="2" fill="url(#accent)">
        <animate attributeName="width" values="0;300;0" dur="4s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Tag labels -->
    <text x="252" y="22" fill="#94a3b8" font-family="Inter, sans-serif" font-size="11" font-weight="500">ON</text>
  </g>

  <!-- Status row -->
  <g transform="translate(282, 200)" font-family="Inter, sans-serif" font-size="12" fill="#64748b" font-weight="500">
    <circle cx="6" cy="-4" r="4" fill="#22c55e">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="18" y="0">analytic-coverage AA</text>

    <circle cx="170" cy="-4" r="4" fill="#22c55e">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <text x="182" y="0">SDF shadows</text>

    <circle cx="290" cy="-4" r="4" fill="#22c55e">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <text x="302" y="0">mimalloc</text>

    <circle cx="400" cy="-4" r="4" fill="#22c55e">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="412" y="0">webview2</text>
  </g>
</svg>
