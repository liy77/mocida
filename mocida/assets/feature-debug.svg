<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Debug subsystem">
  <title>Debug subsystem: logger, profiler, overlay, crash handler</title>
  <defs>
    <linearGradient id="cardBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#161f33"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
  </defs>

  <rect width="700" height="280" rx="14" fill="#0b1220"/>

  <!-- Logger card -->
  <g transform="translate(30, 30)">
    <rect width="200" height="100" rx="10" fill="url(#cardBg)" stroke="#1f2937"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#38bdf8" letter-spacing="0.1em">LOGGER</text>
    <g font-family="JetBrains Mono, Consolas, monospace" font-size="9" fill="#e2e8f0">
      <text x="14" y="44">
        <tspan fill="#94a3b8">10:23:45.012</tspan>
        <tspan fill="#22c55e"> INFO </tspan><tspan fill="#94a3b8">[mocida.core]</tspan>
      </text>
      <text x="14" y="58">
        <tspan fill="#94a3b8">10:23:45.512</tspan>
        <tspan fill="#fbbf24"> WARN </tspan><tspan fill="#94a3b8">[mocida.layout]</tspan>
        <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.2;1" dur="4s" repeatCount="indefinite"/>
      </text>
      <text x="14" y="72">
        <tspan fill="#94a3b8">10:23:46.001</tspan>
        <tspan fill="#ef4444"> ERROR </tspan><tspan fill="#94a3b8">[mocida.render]</tspan>
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.4;0.5;1" dur="4s" repeatCount="indefinite"/>
      </text>
      <text x="14" y="86">
        <tspan fill="#94a3b8">10:23:46.234</tspan>
        <tspan fill="#22c55e"> INFO </tspan><tspan fill="#94a3b8">[mocida.memory]</tspan>
        <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.6;0.7;0.8;1" dur="4s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- Profiler card -->
  <g transform="translate(245, 30)">
    <rect width="200" height="100" rx="10" fill="url(#cardBg)" stroke="#1f2937"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#38bdf8" letter-spacing="0.1em">PROFILER</text>
    <text x="186" y="22" text-anchor="end" font-family="JetBrains Mono, Consolas, monospace" font-size="11" font-weight="700" fill="#22d3ee">192 fps</text>
    <g font-family="JetBrains Mono, Consolas, monospace" font-size="10" fill="#e2e8f0">
      <text x="14" y="44">frame  <tspan fill="#22d3ee">5.2 ms</tspan></text>
      <text x="14" y="58">event  <tspan fill="#22d3ee">0.4 ms</tspan></text>
      <text x="14" y="72">layout <tspan fill="#22d3ee">1.1 ms</tspan></text>
      <text x="14" y="86">render <tspan fill="#22d3ee">3.4 ms</tspan></text>
    </g>
    <!-- mini bar chart -->
    <g transform="translate(125, 38)">
      <rect width="60" height="6" rx="2" fill="#1f2937"/>
      <rect width="0" height="6" rx="2" fill="#22d3ee">
        <animate attributeName="width" values="0;48;36;48" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect y="14" width="60" height="6" rx="2" fill="#1f2937"/>
      <rect y="14" width="0" height="6" rx="2" fill="#0ea5e9">
        <animate attributeName="width" values="0;20;28;20" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect y="28" width="60" height="6" rx="2" fill="#1f2937"/>
      <rect y="28" width="0" height="6" rx="2" fill="#7c3aed">
        <animate attributeName="width" values="0;55;42;55" dur="2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- Overlay card -->
  <g transform="translate(460, 30)">
    <rect width="210" height="100" rx="10" fill="url(#cardBg)" stroke="#1f2937"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#38bdf8" letter-spacing="0.1em">OVERLAY · F9 · F10 · F8</text>
    <!-- fake bounds: outlined widgets -->
    <g transform="translate(18, 36)" fill="none" stroke-width="1.5">
      <rect width="80" height="20" rx="3" stroke="#22d3ee"/>
      <rect y="26"  width="50" height="14" rx="3" stroke="#fbbf24"/>
      <rect x="60" y="26" width="35" height="14" rx="3" stroke="#fbbf24"/>
      <rect y="48"  width="100" height="10" rx="3" stroke="#a78bfa"/>
      <!-- pulse on top widget -->
      <rect width="80" height="20" rx="3" stroke="#22d3ee" stroke-width="2" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="width"   values="80;88;80" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="height"  values="20;28;20" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="x" values="0;-4;0" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="0;-4;0" dur="2s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="125" y="50" font-family="JetBrains Mono, Consolas, monospace" font-size="9" fill="#94a3b8">5.2 ms</text>
    <text x="125" y="64" font-family="JetBrains Mono, Consolas, monospace" font-size="9" fill="#94a3b8">192 fps</text>
    <text x="125" y="78" font-family="JetBrains Mono, Consolas, monospace" font-size="9" fill="#94a3b8">21 widgets</text>
  </g>

  <!-- Bottom row: crash + sanitizers -->
  <g transform="translate(30, 150)">
    <rect width="640" height="100" rx="10" fill="url(#cardBg)" stroke="#1f2937"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ef4444" letter-spacing="0.1em">CRASH HANDLER · ALWAYS-ON</text>
    <g font-family="JetBrains Mono, Consolas, monospace" font-size="10.5" fill="#e2e8f0">
      <text x="14" y="42">
        <tspan fill="#ef4444">[mocida]</tspan> crash → mocida_crash_20260523_153422.log (ACCESS_VIOLATION)
      </text>
      <text x="14" y="58">  #0 0x00007ff64b... <tspan fill="#38bdf8">UIWidget_Destroy</tspan> (widget.c:148)</text>
      <text x="14" y="74">  #1 0x00007ff64b... <tspan fill="#38bdf8">UIApp_Destroy</tspan>    (app.c:531)</text>
      <text x="14" y="90">  --- widget tree --- 21 nodes captured ---
        <animate attributeName="opacity" values="0;1" dur="1s" begin="0s" fill="freeze"/>
      </text>
    </g>
  </g>
</svg>
