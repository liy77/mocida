<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" preserveAspectRatio="xMidYMid meet" role="img" aria-label="mocida-rs — Rust bindings to the mocida C UI toolkit">
  <title>mocida-rs</title>

  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0"   stop-color="#0b1220" stop-opacity="0.95"/>
      <stop offset="0.6" stop-color="#111827" stop-opacity="0.92"/>
      <stop offset="1"   stop-color="#0b1220" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#dea584"/>
      <stop offset="1" stop-color="#f6b06d"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Stage -->
  <rect width="1200" height="260" rx="18" fill="url(#bg)"/>

  <!-- Subtle grid backdrop -->
  <g stroke="#1f2937" stroke-width="1" opacity="0.4">
    <line x1="0" y1="65"  x2="1200" y2="65" />
    <line x1="0" y1="130" x2="1200" y2="130"/>
    <line x1="0" y1="195" x2="1200" y2="195"/>
  </g>

  <!-- Floating accent particles, tinted Rust-orange instead of cyan. -->
  <g fill="#f6b06d" opacity="0.20">
    <circle cx="180" cy="40"  r="2"><animate attributeName="cy" values="40;30;40"   dur="6s"   repeatCount="indefinite"/></circle>
    <circle cx="520" cy="220" r="3"><animate attributeName="cy" values="220;210;220" dur="5s"   repeatCount="indefinite"/></circle>
    <circle cx="900" cy="30"  r="2"><animate attributeName="cy" values="30;40;30"    dur="7s"   repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="180" r="3"><animate attributeName="cy" values="180;170;180" dur="6.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- LOGO group: same two breathing blocks as mocida + a small "rs"
       block tucked under them so the Rust binding reads at a glance. -->
  <g transform="translate(90, 70)">
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-2 50 50; 2 50 50; -2 50 50" dur="7s" repeatCount="indefinite"/>
      <rect x="0" y="0" width="100" height="100" rx="14" fill="#5271ff" filter="url(#glow)" opacity="0.95"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="3 100 100; -3 100 100; 3 100 100" dur="8s" repeatCount="indefinite"/>
      <rect x="50" y="50" width="100" height="100" rx="14" fill="#ff3131" filter="url(#glow)" opacity="0.95"/>
    </g>
    <g>
      <rect x="95" y="95" width="60" height="60" rx="10" fill="#dea584" opacity="0.97"/>
      <text x="125" y="138"
            text-anchor="middle"
            font-family="ui-monospace, SF Mono, Consolas, monospace"
            font-size="32" font-weight="800" letter-spacing="-1"
            fill="#2b1d0e">rs</text>
    </g>
  </g>

  <!-- Title + tagline -->
  <text x="280" y="120" fill="#e2e8f0"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="64" font-weight="800" letter-spacing="-1.5">mocida-<tspan fill="#dea584">rs</tspan></text>
  <text x="282" y="158" fill="#94a3b8"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="18" font-weight="500" letter-spacing="0.2">Rust bindings to the mocida C UI toolkit · SDL3 · WebView2 · safe wrappers</text>
  <rect x="282" y="172" height="2" rx="1" fill="url(#accent)">
    <animate attributeName="width" values="0;180;180;0" keyTimes="0;0.4;0.85;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Right side: tiny Rust snippet card -->
  <g transform="translate(800, 50)">
    <rect x="-12" y="-10" width="360" height="170" rx="14" fill="#0f172a" opacity="0.85" stroke="#1f2937"/>

    <!-- Mock window chrome -->
    <g transform="translate(4, 4)">
      <circle cx="6"  cy="6" r="4" fill="#ef4444"/>
      <circle cx="20" cy="6" r="4" fill="#f59e0b"/>
      <circle cx="34" cy="6" r="4" fill="#22c55e"/>
    </g>

    <!-- Code lines -->
    <g font-family="ui-monospace, Consolas, SF Mono, monospace" font-size="13" font-weight="500">
      <text x="0"  y="36" fill="#f6b06d">use</text>
      <text x="32" y="36" fill="#e2e8f0">mocida::{App, Color, Button};</text>

      <text x="0"  y="60" fill="#94a3b8">// builder-style, zero unsafe</text>

      <text x="0"  y="84" fill="#f6b06d">let</text>
      <text x="32" y="84" fill="#e2e8f0">btn = Button::new(</text>
      <text x="178" y="84" fill="#a3e635">"Hello"</text>
      <text x="230" y="84" fill="#e2e8f0">, 18.0)?</text>

      <text x="32" y="104" fill="#e2e8f0">.colors(Color::</text>
      <text x="148" y="104" fill="#7dd3fc">BLUE</text>
      <text x="186" y="104" fill="#e2e8f0">, Color::</text>
      <text x="252" y="104" fill="#7dd3fc">WHITE</text>
      <text x="296" y="104" fill="#e2e8f0">)</text>

      <text x="32" y="124" fill="#e2e8f0">.on_click(|b| {</text>
      <text x="148" y="124" fill="#94a3b8">/* … */</text>
      <text x="208" y="124" fill="#e2e8f0">});</text>
    </g>

    <!-- Cursor blink -->
    <rect x="252" y="115" width="2" height="14" fill="#e2e8f0">
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Status row -->
  <g transform="translate(282, 200)" font-family="Inter, sans-serif" font-size="12" fill="#64748b" font-weight="500">
    <circle cx="6" cy="-4" r="4" fill="#22c55e">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="18" y="0">bindgen FFI</text>

    <circle cx="120" cy="-4" r="4" fill="#22c55e">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <text x="132" y="0">Drop-safe</text>

    <circle cx="220" cy="-4" r="4" fill="#22c55e">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <text x="232" y="0">Signal&lt;T&gt;</text>

    <circle cx="330" cy="-4" r="4" fill="#22c55e">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="342" y="0">closures</text>
  </g>
</svg>
